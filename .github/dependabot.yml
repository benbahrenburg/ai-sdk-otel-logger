version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "@opentelemetry/*"
      production-dependencies:
        dependency-type: production
        exclude-patterns:
          - "@opentelemetry/*"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
